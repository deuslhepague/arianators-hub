name: Hourly Playcount Update

on:
  schedule:
    # Executa a cada hora (no minuto 0)
    - cron: '0 * * * *'
  # Permite trigger manual no GitHub
  workflow_dispatch:

jobs:
  update-tracks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger hourly playcount update
        run: |
          curl -X POST \
            -H "x-admin-passcode: ${{ secrets.ADMIN_PASSCODE }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/scheduled-update" \
            -d '{"message":"automatic hourly update"}'
        
      - name: Wait a moment
        run: sleep 5
        
      - name: Check if update succeeded
        run: |
          echo "✅ Update request sent successfully!"
          echo "Check your app logs for details"
